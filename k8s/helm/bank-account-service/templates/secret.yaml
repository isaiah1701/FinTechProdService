{{- if .Values.localSecret.enabled }}
{{- if not .Values.localSecret.databaseUrl }}
{{- fail "localSecret.databaseUrl must be supplied at deploy time when localSecret.enabled=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.secretName }}
  labels:
    app.kubernetes.io/name: bank-account-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    bank.example/local-only: "true"
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.localSecret.databaseUrl | quote }}
{{- end }}
