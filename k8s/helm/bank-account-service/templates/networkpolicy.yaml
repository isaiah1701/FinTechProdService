{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: bank-account-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  # Demonstrates network intent: allow the app path in, and restrict egress to
  # DNS, Postgres, and HTTPS for cloud APIs. A real bank rollout would tighten
  # selectors once namespaces and controllers are fixed.
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bank-account-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgresPort }}
    - ports:
        - protocol: TCP
          port: 443
{{- end }}
