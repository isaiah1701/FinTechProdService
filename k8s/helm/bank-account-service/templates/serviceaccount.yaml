{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default .Release.Name .Values.serviceAccount.name }}
  labels:
    app.kubernetes.io/name: bank-account-service
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- if .Values.aws.enabled }}
  annotations:
    # Production uses workload identity instead of static AWS keys in pods.
    eks.amazonaws.com/role-arn: {{ .Values.aws.irsaRoleArn | quote }}
  {{- end }}
{{- end }}
