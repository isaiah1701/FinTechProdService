apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: bank-account-service
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  # Early-stage bank rationale:
  # keep old pods serving while one new pod comes up, so account reads do not
  # disappear during a normal release.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bank-account-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bank-account-service
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ default .Release.Name .Values.serviceAccount.name }}
      # Gives Kubernetes enough time to remove the pod from endpoints and let
      # in-flight banking requests complete before the process exits.
      terminationGracePeriodSeconds: 45
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      containers:
        - name: bank-account-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName }}
                  key: DATABASE_URL
          lifecycle:
            preStop:
              exec:
                # Short propagation delay: useful while the bank is small because
                # it is simple and avoids adding a service mesh just for drains.
                command: ["/bin/sh", "-c", "sleep 10"]
          # Liveness proves only that the process is alive. It should not depend
          # on Postgres, otherwise a database incident could restart every pod.
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # Readiness is dependency-aware. If Postgres is unreachable or the pod
          # is draining, Kubernetes stops sending customer account reads here.
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 1
          resources:
{{ toYaml .Values.resources | indent 12 }}
          # A restrictive runtime is cheap protection for a young bank: non-root,
          # no privilege escalation, no writable root filesystem, and no Linux caps.
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
