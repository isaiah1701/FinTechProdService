services:
  postgres:
    image: postgres:16.4-bookworm
    environment:
      POSTGRES_DB: bank_accounts
      POSTGRES_USER: bank_owner
      POSTGRES_PASSWORD: ${BANK_POSTGRES_OWNER_PASSWORD:?set BANK_POSTGRES_OWNER_PASSWORD in your shell or local .env}
      BANK_ACCOUNT_APP_PASSWORD: ${BANK_ACCOUNT_APP_PASSWORD:?set BANK_ACCOUNT_APP_PASSWORD in your shell or local .env}
    ports:
      - "${BANK_POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./postgres:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bank_owner -d bank_accounts"]
      interval: 5s
      timeout: 3s
      retries: 20

  localstack:
    image: localstack/localstack:3.8.1
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: eu-west-2
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.1
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${BANK_GRAFANA_ADMIN_PASSWORD:?set BANK_GRAFANA_ADMIN_PASSWORD in your shell or local .env}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.113.0
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel/otel-collector.yaml:/etc/otel-collector.yaml:ro

volumes:
  postgres-data:
  localstack-data:
