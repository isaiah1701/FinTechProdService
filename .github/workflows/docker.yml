name: Docker

on:
  pull_request:
    paths:
      - app/**
      - .github/workflows/docker.yml
  push:
    branches: [main]
    paths:
      - app/**
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: app/src
        run: pytest app/tests

      - name: Set immutable image tag
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/mal-account-service:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE_NAME" -f app/Dockerfile .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push immutable image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "$IMAGE_NAME"
