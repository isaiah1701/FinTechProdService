name: Docker

on:
  pull_request:
    paths:
      - app/**
      - .github/workflows/docker.yml
  push:
    branches: [main]
    paths:
      - app/**
      - .github/workflows/docker.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  test-build-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r app/requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: app/src
        run: pytest app/tests

      # Tests gate image creation. If unit tests fail, no image is built or promoted.
      - name: Set immutable image tag
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/bank-account-service:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build image
        run: docker build -t "$IMAGE_NAME" -f app/Dockerfile .

      # Trivy gates promotion. Docker rollback is performed by redeploying a
      # previously known-good immutable Git SHA tag; no bare latest tag is used.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push immutable image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: docker push "$IMAGE_NAME"

      - name: Configure AWS credentials for ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AWS_ROLE_TO_ASSUME != '' && vars.ECR_REGISTRY != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-2

      - name: Push immutable image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.AWS_ROLE_TO_ASSUME != '' && vars.ECR_REGISTRY != ''
        run: |
          ECR_REPOSITORY="${{ vars.ECR_REPOSITORY }}"
          ECR_REPOSITORY="${ECR_REPOSITORY:-bank-account-service}"
          ECR_IMAGE="${{ vars.ECR_REGISTRY }}/${ECR_REPOSITORY}:${GITHUB_SHA}"
          aws ecr get-login-password --region eu-west-2 | docker login --username AWS --password-stdin "${{ vars.ECR_REGISTRY }}"
          docker tag "$IMAGE_NAME" "$ECR_IMAGE"
          docker push "$ECR_IMAGE"
